apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: lab-tasks
spec:
  steps:
    - name: cleanup
      image: alpine
      script: |
        echo "Cleaning up..."
        rm -rf $(workspaces.source.path)/*
    - name: Run unit tests with nose  # <--- Ganti ini agar sesuai feedback
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install nose
        nosetests
